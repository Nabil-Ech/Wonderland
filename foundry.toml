[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/=lib/openzeppelin-contracts/"
]
extra_output_files = ["abi"]
## Removed pinned solc 0.8.28 — target contracts require 0.8.19, let Foundry auto-resolve
optimizer = true
optimizer_runs = 200
via_ir = true  # needed for attack_score.s.sol (stack too deep without IR)
evm_version = "cancun"

# Gas optimization for fast deploys during CTF
[profile.ctf]
optimizer = true
optimizer_runs = 1          # minimize deploy cost (fewer runs = smaller bytecode)
via_ir = true               # IR pipeline can produce smaller bytecode

# RPC endpoints - fill these in at the venue
[rpc_endpoints]
ctf = "${CTF_RPC_URL}"
